<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bulk STK Push Bot</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="container">
  <h1>Bulk STK Push</h1>

  <textarea
    id="numbers"
    placeholder="Enter phone numbers separated by commas or new lines"
  ></textarea>

  <input
    type="number"
    id="amount"
    placeholder="Amount"
  />

  <input
    type="text"
    id="description"
    placeholder="Transaction Description"
  />

  <button onclick="sendBulk()">
    Send STK Push
  </button>

  <div id="results"></div>
</div>

<script src="app.js"></script>
</body>
</html>
